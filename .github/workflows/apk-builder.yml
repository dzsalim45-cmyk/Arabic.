name: Generic APK Builder
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build APK
        run: |
          # Find gradlew file avoiding node_modules
          GRADLEW_PATH=$(find . -not -path "*/node_modules/*" -not -path "*/.git/*" -name "gradlew" -type f | head -n 1)
          
          if [ -n "$GRADLEW_PATH" ]; then
            GRADLE_DIR=$(dirname "$GRADLEW_PATH")
            echo "Found gradlew in $GRADLE_DIR"
            cd "$GRADLE_DIR"
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            chmod +x gradlew
            ./gradlew assembleDebug --stacktrace --no-daemon || ./gradlew assemble --stacktrace --no-daemon
          else
            echo "No gradlew found. Trying global gradle."
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            gradle assembleDebug --stacktrace --no-daemon || gradle assemble --stacktrace --no-daemon
          fi

      - name: Upload APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-apks
          path: '**/*.apk'
